<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title> ❤️ </title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --primary: #0084ff;
            --dark-bg: #0b0d0f;
            --card-bg: #1a1d21;
            --text: #e4e6eb;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--dark-bg); color: var(--text);
            overflow: hidden; width: 100%;
            overscroll-behavior: none;
        }

        #login-screen {
            display: flex; align-items: center; justify-content: center;
            height: 100%; z-index: 9999; background: var(--dark-bg);
            position: absolute; width: 100%;
        }

        .login-card {
            background: var(--card-bg); padding: 30px; border-radius: 20px;
            text-align: center; width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .login-card input {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333;
            background: #2a2d31; color: white; margin-bottom: 15px; outline: none;
        }

        .login-card button {
            width: 100%; padding: 12px; border-radius: 10px; border: none;
            background: var(--primary); color: white; font-weight: bold;
        }

        #chat-screen { 
            display: none; 
            flex-direction: column; 
            height: 100vh; 
            height: -webkit-fill-available;
        }

        header {
            background: var(--card-bg); padding: 10px; text-align: center;
            border-bottom: 1px solid #333; flex-shrink: 0;
        }

        #status-info { font-size: 11px; margin-top: 2px; height: 13px; font-weight: 500; }

        #messages {
            flex: 1; overflow-y: auto; padding: 15px; display: flex;
            flex-direction: column; gap: 12px; -webkit-overflow-scrolling: touch;
        }

        .msg-row { display: flex; align-items: flex-end; gap: 8px; position: relative; }
        .my-msg { flex-direction: row-reverse; }

        .avatar {
            width: 32px; height: 32px; border-radius: 50%;
            font-size: 12px; display: flex; align-items: center;
            justify-content: center; font-weight: bold; color: white; flex-shrink: 0;
        }

        .bubble {
            padding: 10px 14px; border-radius: 18px; font-size: 15px;
            max-width: 75%; position: relative; word-wrap: break-word;
        }

        .my-msg .bubble { background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .other-msg .bubble { background: #303338; color: white; border-bottom-left-radius: 4px; }

        .reply-preview-in-msg {
            background: rgba(0,0,0,0.2); padding: 5px 8px; border-left: 3px solid #fff;
            border-radius: 4px; margin-bottom: 5px; font-size: 12px; opacity: 0.8;
        }

        .reaction-box {
            display: none; position: absolute; top: -55px;
            background: #2a2d31; border-radius: 25px; padding: 5px 12px; gap: 10px; z-index: 5000;
        }

        .msg-reactions {
            font-size: 14px; margin-top: -8px; margin-left: 10px;
            background: #333; border-radius: 10px; padding: 2px 6px;
            border: 2px solid var(--dark-bg); width: fit-content;
        }

        .input-area-container { 
            background: var(--card-bg); 
            border-top: 1px solid #333; 
            flex-shrink: 0; 
            padding-bottom: env(safe-area-inset-bottom);
            width: 100%;
            z-index: 20;
        }

        .typing { font-size: 11px; color: #888; padding: 5px 15px; min-height: 15px; }

        .input-bar { display: flex; align-items: center; gap: 10px; padding: 10px; }
        #msgInp {
            flex: 1; border: none; background: #2a2d31; padding: 12px 15px;
            border-radius: 20px; outline: none; color: white; font-size: 16px;
        }

        #send-btn {
            background: var(--primary); color: white; border: none;
            width: 40px; height: 40px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; flex-shrink: 0;
        }

        #context-menu {
            display: none; position: fixed; background: #2a2d31;
            border-radius: 12px; padding: 5px 0; z-index: 4000; min-width: 150px;
        }
        .menu-item { padding: 12px 20px; color: white; cursor: pointer; border-bottom: 1px solid #333; }
        .menu-item:last-child { border-bottom: none; }
        .read-status { width: 7px; height: 7px; background: #4CAF50; border-radius: 50%; display: inline-block; margin-left: 4px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2> ❤️ </h2>
            <input type="text" id="nameInput" placeholder="Անունդ..." autocomplete="off">
            <button onclick="enter()">Մտնել</button>
        </div>
    </div>

    <div id="chat-screen">
        <header>
            <div style="font-size: 18px;"> ❤️ </div>
            <div id="status-info"></div>
        </header>

        <div id="messages"></div>

        <div id="context-menu">
            <div class="menu-item" onclick="prepareReply()">Reply</div>
            <div class="menu-item" id="delBtn" style="color:#ff4444;">Delete</div>
        </div>

        <div class="input-area-container">
            <div id="reply-bar" style="display:none; padding:8px 15px; background:rgba(255,255,255,0.05); display:flex; justify-content:space-between; align-items:center;">
                <div id="reply-info" style="font-size:12px; color:#aaa; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"></div>
                <div onclick="cancelReply()" style="color:#ff4444; cursor:pointer; font-weight:bold; padding: 5px;">✕</div>
            </div>
            <div id="typing-box" class="typing"></div>
            <div class="input-bar">
                <button style="background:none; border:none; font-size:24px; flex-shrink:0;" onclick="document.getElementById('imgInp').click()">📷</button>
                <input type="file" id="imgInp" style="display:none" accept="image/*" onchange="sendImg(this)">
                <input type="text" id="msgInp" placeholder="Գրիր նամակ..." autocomplete="off">
                <button id="send-btn" onclick="send()">➤</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBYHiH5sa7PLLqeHeHGB-p1hWU5TcY82Dw",
            authDomain: "mychat-160ff.firebaseapp.com",
            databaseURL: "https://mychat-160ff-default-rtdb.firebaseio.com",
            projectId: "mychat-160ff",
            storageBucket: "mychat-160ff.firebasestorage.app",
            messagingSenderId: "574166080101",
            appId: "1:574166080101:web:504c6f77687cd01fb7048c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const room = "private_room_2026";

        let user = "";
        let replyData = null;
        let pressTimer;
        let activeMsgData = null;

        function enter() {
            user = document.getElementById('nameInput').value.trim();
            if(!user) return;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            
            const myStatusRef = db.ref('status/' + room + '/' + user);

            // Heartbeat: 15 վայրկյանը մեկ թարմացնում ենք օնլայն լինելը
            setInterval(() => {
                const now = new Date();
                const time = now.getHours() + ":" + (now.getMinutes()<10?'0':'') + now.getMinutes();
                myStatusRef.set({ 
                    online: true, 
                    last_seen: time, 
                    last_active: Date.now() 
                });
            }, 15000);

            myStatusRef.onDisconnect().set({ 
                online: false, 
                last_seen: new Date().getHours() + ":" + (new Date().getMinutes()<10?'0':'') + new Date().getMinutes(),
                last_active: Date.now() 
            });

            trackPartnerStatus();
            init();
        }

        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                document.body.style.height = window.visualViewport.height + 'px';
                scrollToBottom();
            });
        }

        function trackPartnerStatus() {
            db.ref('status/' + room).on('value', (snap) => {
                const data = snap.val(); if (!data) return;
                const partner = Object.keys(data).find(n => n !== user);
                const info = document.getElementById('status-info');
                
                if (partner) {
                    const s = data[partner];
                    const now = Date.now();
                    // Եթե 35 վայրկյանից ավել ակտիվ չէ, ուրեմն Offline է
                    const isReallyOnline = s.online && (now - s.last_active < 35000);

                    if (isReallyOnline) { 
                        info.innerText = "Online"; 
                        info.style.color = "#4CAF50"; 
                    } else { 
                        info.innerText = "Վերջին անգամ՝ " + s.last_seen; 
                        info.style.color = "#888"; 
                    }
                }
            });
        }

        function scrollToBottom() {
            const m = document.getElementById('messages');
            m.scrollTop = m.scrollHeight;
        }

        function send() {
            const val = document.getElementById('msgInp').value.trim();
            if(!val) return;
            pushMsg({t:'text', c:val, r:replyData});
            cancelReply();
            document.getElementById('msgInp').value = "";
        }

        function sendImg(inp) {
            const f = inp.files[0];
            if(!f) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    let width = img.width;
                    let height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    // Image quality set to 0.6 for stability
                    pushMsg({t:'image', c:canvas.toDataURL('image/jpeg', 0.6), r:replyData});
                    cancelReply();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(f);
            inp.value = "";
        }

        function pushMsg(data) {
            const now = new Date();
            const time = now.getHours() + ":" + (now.getMinutes()<10?'0':'') + now.getMinutes();
            db.ref('chats/'+room).push({
                u: user, type: data.t, content: data.c, reply: data.r,
                time: time, timestamp: Date.now(), read: false
            });
            setTimeout(scrollToBottom, 100);
        }

        function init() {
            const dayAgo = Date.now() - 86400000;
            db.ref('chats/'+room).orderByChild('timestamp').endAt(dayAgo).once('value', s => s.forEach(c => c.ref.remove()));

            db.ref('chats/'+room).limitToLast(25).on('child_added', (snap) => {
                const d = snap.val();
                if(d.u !== user && !d.read) db.ref('chats/'+room+'/'+snap.key).update({read:true});
                render(snap.key, d);
            });

            db.ref('chats/'+room).on('child_removed', snap => document.querySelector(`[data-id="${snap.key}"]`)?.remove());
            db.ref('chats/'+room).on('child_changed', snap => {
                const d = snap.val();
                const el = document.querySelector(`[data-id="${snap.key}"]`);
                if(el) {
                    if(d.read && d.u === user) el.querySelector('.read-area').innerHTML = '<span class="read-status"></span>';
                    if(d.reactions) {
                        const rDiv = el.querySelector('.msg-reactions');
                        rDiv.innerText = Object.values(d.reactions).join(' ');
                        rDiv.style.display = 'block';
                    }
                }
            });

            db.ref('typing/'+room).on('value', s => {
                const d = s.val();
                document.getElementById('typing-box').innerText = (d && d.s && d.u !== user) ? d.u + " գրում է..." : "";
            });
        }

        function render(id, d) {
            if(document.querySelector(`[data-id="${id}"]`)) return;
            const isMe = d.u === user;
            const reacts = d.reactions ? Object.values(d.reactions).join(' ') : "";
            let content = d.type === 'text' ? `<div>${d.content}</div>` : `<img src="${d.content}" style="max-width:100%; border-radius:10px; display:block;">`;
            let reply = d.reply ? `<div class="reply-preview-in-msg"><b>${d.reply.u}:</b> ${d.reply.c.substring(0,15)}...</div>` : "";

            const html = `
                <div class="msg-row ${isMe?'my-msg':'other-msg'}" data-id="${id}">
                    <div class="reaction-box" id="react-${id}">
                        <span onclick="addReact('${id}', '❤️')">❤️</span>
                        <span onclick="addReact('${id}', '😂')">😂</span>
                        <span onclick="addReact('${id}', '💋')">💋</span>
                        <span onclick="addReact('${id}', '👍')">👍</span>
                    </div>
                    <div class="avatar" style="background:${isMe?'#0084ff':'#555'}">${d.u[0].toUpperCase()}</div>
                    <div class="bubble" ontouchstart="holdStart(event, '${id}', '${d.u}', '${d.type==='text'?d.content.replace(/'/g, "\\'"):'📷 Նկար'}')" ontouchend="holdEnd()">
                        ${reply} ${content}
                        <div style="font-size:9px; opacity:0.5; text-align:right; margin-top:4px;">
                            ${d.time} <span class="read-area">${isMe && d.read ? '<span class="read-status"></span>':''}</span>
                        </div>
                    </div>
                    <div class="msg-reactions" style="display:${reacts?'block':'none'}">${reacts}</div>
                </div>`;
            document.getElementById('messages').insertAdjacentHTML('beforeend', html);
            scrollToBottom();
        }

        function holdStart(e, id, u, c) {
            activeMsgData = {id, u, c};
            pressTimer = setTimeout(() => {
                const touch = e.touches[0];
                document.getElementById('react-'+id).style.display = 'flex';
                const menu = document.getElementById('context-menu');
                menu.style.display = 'block';
                menu.style.left = touch.pageX + 'px';
                menu.style.top = (touch.pageY - 70) + 'px';
                document.getElementById('delBtn').style.display = u === user ? 'block' : 'none';
                document.getElementById('delBtn').onclick = () => { db.ref(`chats/${room}/${id}`).remove(); closeAll(); };
            }, 600);
        }

        function holdEnd() { clearTimeout(pressTimer); }
        function cancelReply() { replyData = null; document.getElementById('reply-bar').style.display = 'none'; }
        function prepareReply() { 
            replyData = {u: activeMsgData.u, c: activeMsgData.c};
            document.getElementById('reply-bar').style.display = 'flex';
            document.getElementById('reply-info').innerText = `Պատասխան ${activeMsgData.u}-ին`;
            closeAll();
            document.getElementById('msgInp').focus();
        }
        function addReact(id, emoji) { db.ref(`chats/${room}/${id}/reactions/${user}`).set(emoji); closeAll(); }
        function closeAll() {
            document.querySelectorAll('.reaction-box').forEach(b => b.style.display = 'none');
            document.getElementById('context-menu').style.display = 'none';
        }
        window.onclick = (e) => { if(!e.target.closest('.bubble')) closeAll(); };

        document.getElementById('msgInp').oninput = () => {
            db.ref('typing/'+room).set({u:user, s:true});
            clearTimeout(window.tOut);
            window.tOut = setTimeout(() => db.ref('typing/'+room).set({s:false}), 2000);
        };
        document.getElementById('msgInp').onkeypress = (e) => { if(e.key === 'Enter') send(); };
    </script>
</body>
</html>
