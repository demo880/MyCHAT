<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> ❤️ </title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #0084ff; --dark-bg: #0b0d0f; --card-bg: #1a1d21; --text: #e4e6eb; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, sans-serif; background: var(--dark-bg); color: var(--text); overflow: hidden; }
        #login-screen { display: flex; align-items: center; justify-content: center; height: 100%; }
        .login-card { background: var(--card-bg); padding: 30px; border-radius: 20px; text-align: center; width: 300px; }
        .login-card input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #2a2d31; color: white; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        .login-card button { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }
        #chat-screen { display: none; flex-direction: column; height: 100vh; position: relative; }
        header { background: var(--card-bg); padding: 15px; text-align: center; font-weight: bold; border-bottom: 1px solid #333; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 150px; scroll-behavior: smooth; }
        .msg-row { display: flex; align-items: flex-end; gap: 8px; position: relative; }
        .my-msg { flex-direction: row-reverse; }
        .avatar { width: 30px; height: 30px; border-radius: 50%; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; flex-shrink: 0; }
        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; max-width: 75%; position: relative; word-wrap: break-word; user-select: none; -webkit-user-select: none; }
        .my-msg .bubble { background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .other-msg .bubble { background: #303338; color: white; border-bottom-left-radius: 4px; }
        .reply-preview-in-msg { background: rgba(0,0,0,0.2); padding: 5px 8px; border-left: 3px solid #fff; border-radius: 4px; margin-bottom: 5px; font-size: 12px; opacity: 0.8; }
        .reply-bar { background: var(--card-bg); padding: 8px 15px; display: none; border-top: 1px solid #333; justify-content: space-between; align-items: center; }
        .reaction-box { display: none; position: absolute; top: -50px; background: #2a2d31; border-radius: 25px; padding: 5px 12px; gap: 10px; z-index: 3500; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .reaction-box span { cursor: pointer; font-size: 22px; transition: transform 0.1s; display: inline-block; }
        .reaction-box span:active { transform: scale(1.5); }
        .msg-reactions { font-size: 14px; margin-top: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; padding: 2px 6px; width: fit-content; }
        .read-status { width: 7px; height: 7px; background: #4CAF50; border-radius: 50%; display: inline-block; margin-left: 4px; }
        .input-area-container { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card-bg); z-index: 2000; border-top: 1px solid #333; }
        .typing { font-size: 11px; color: #888; padding: 5px 15px; min-height: 15px; }
        .input-bar { display: flex; align-items: center; gap: 10px; padding: 10px; }
        #msgInp { flex: 1; border: none; background: #2a2d31; padding: 12px 15px; border-radius: 20px; outline: none; color: white; font-size: 16px; }
        #send-btn { background: var(--primary); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 18px; }
        #context-menu { display: none; position: fixed; background: #2a2d31; border-radius: 10px; padding: 5px 0; z-index: 4000; box-shadow: 0 0 20px rgba(0,0,0,0.8); min-width: 140px; }
        .menu-item { padding: 12px 20px; color: white; cursor: pointer; font-size: 14px; }
        .delete-item { color: #ff4444; border-top: 1px solid #444; }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-card">
            <h2> ❤️ </h2>
            <input type="text" id="nameInput" placeholder="Անունդ..." autocomplete="off">
            <button onclick="enter()">Մտնել</button>
        </div>
    </div>
    <div id="chat-screen">
        <header> ❤️ </header>
        <div id="messages"></div>
        <div id="context-menu">
            <div class="menu-item" id="reply-action">Reply (Պատասխանել)</div>
            <div class="menu-item delete-item" id="delete-action">Delete (Ջնջել)</div>
        </div>
        <div class="input-area-container">
            <div id="reply-bar" class="reply-bar">
                <div id="reply-info" style="font-size:12px; color:#aaa;"></div>
                <div onclick="cancelReply()" style="cursor:pointer; color:red; font-weight:bold;">✕</div>
            </div>
            <div id="typing-box" class="typing"></div>
            <div class="input-bar">
                <label style="cursor:pointer; font-size:22px;">📷<input type="file" id="imgInp" hidden accept="image/*" onchange="sendImg(this)"></label>
                <input type="text" id="msgInp" placeholder="Գրիր նամակ..." autocomplete="off">
                <button id="send-btn" onclick="send()">➤</button>
            </div>
        </div>
    </div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBYHiH5sa7PLLqeHeHGB-p1hWU5TcY82Dw",
            authDomain: "mychat-160ff.firebaseapp.com",
            databaseURL: "https://mychat-160ff-default-rtdb.firebaseio.com",
            projectId: "mychat-160ff",
            storageBucket: "mychat-160ff.firebasestorage.app",
            messagingSenderId: "574166080101",
            appId: "1:574166080101:web:504c6f77687cd01fb7048c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const room = "private_room_2026";
        let user = "", replyData = null, pressTimer, tOut;

        function enter() {
            user = document.getElementById('nameInput').value.trim();
            if(!user) return;
            document.getElementById('login-screen').style.display='none';
            document.getElementById('chat-screen').style.display='flex';
            init();
        }

        function send() {
            const val = document.getElementById('msgInp').value.trim();
            if(!val) return;
            pushMsg({t:'text', c:val, r: replyData});
            cancelReply();
            document.getElementById('msgInp').value = "";
        }

        function sendImg(inp) {
            const f = inp.files[0];
            if(!f) return;
            const r = new FileReader();
            r.onload = (e) => {
                pushMsg({t:'image', c:e.target.result, r: replyData});
                cancelReply();
            };
            r.readAsDataURL(f);
            inp.value = ""; // Սա թույլ է տալիս նույն նկարը նորից ընտրել
        }

        function pushMsg(data) {
            const now = new Date();
            const time = now.getHours() + ":" + (now.getMinutes()<10?'0':'') + now.getMinutes();
            db.ref('chats/'+room).push({ u: user, type: data.t, content: data.c, reply: data.r, time: time, reactions: {}, read: false });
        }

        function cancelReply() { replyData = null; document.getElementById('reply-bar').style.display = 'none'; }

        function init() {
            db.ref('chats/'+room).on('child_added', (snap) => {
                const d = snap.val();
                if(d.u !== user && !d.read) db.ref('chats/'+room+'/'+snap.key).update({read:true});
                render(snap.key, d);
            });
            db.ref('chats/'+room).on('child_removed', snap => document.querySelector(`[data-id="${snap.key}"]`)?.remove());
            db.ref('chats/'+room).on('child_changed', snap => {
                const d = snap.val();
                const el = document.querySelector(`[data-id="${snap.key}"]`);
                if(el) {
                    const rDiv = el.querySelector('.msg-reactions');
                    if(rDiv) {
                        const reactions = Object.values(d.reactions || {}).join(' ');
                        rDiv.innerText = reactions;
                        rDiv.style.display = reactions ? 'block' : 'none';
                    }
                    if(d.u === user && d.read) {
                        const ra = el.querySelector('.read-area');
                        if(ra && !ra.innerHTML) ra.innerHTML = '<span class="read-status"></span>';
                    }
                }
            });
            db.ref('typing/'+room).on('value', s => {
                const d = s.val();
                document.getElementById('typing-box').innerText = (d && d.s && d.u !== user) ? d.u + " գրում է..." : "";
            });
        }

        function render(id, d) {
            const isMe = d.u === user;
            let replyHTML = d.reply ? `<div class="reply-preview-in-msg"><b>${d.reply.u}:</b> ${d.reply.c.substring(0,15)}...</div>` : "";
            const reactions = Object.values(d.reactions || {}).join(' ');
            
            const html = `
                <div class="msg-row ${isMe?'my-msg':'other-msg'}" data-id="${id}">
                    <div class="reaction-box">
                        <span onclick="react('${id}', '❤️')">❤️</span>
                        <span onclick="react('${id}', '😂')">😂</span>
                        <span onclick="react('${id}', '💋')">💋</span>
                        <span onclick="react('${id}', '🫂')">🫂</span>
                        <span onclick="react('${id}', '👍')">👍</span>
                    </div>
                    <div class="avatar" style="background:${isMe?'#0084ff':'#555'}">${d.u[0]}</div>
                    <div class="bubble" 
                         ontouchstart="startPress(event, '${id}', '${d.u}', '${d.content.replace(/'/g, "\\'")}')" 
                         ontouchend="endPress()">
                        ${replyHTML}
                        ${d.type==='text' ? `<div>${d.content}</div>` : `<img src="${d.content}" style="max-width:100%; border-radius:10px; display:block;">`}
                        <div style="font-size:9px; opacity:0.5; margin-top:4px; display:flex; align-items:center; justify-content:flex-end;">
                            ${d.time} <span class="read-area" style="margin-left:4px;">${isMe && d.read ? '<span class="read-status"></span>' : ''}</span>
                        </div>
                        <div class="msg-reactions" style="display:${reactions?'block':'none'}">${reactions}</div>
                    </div>
                </div>`;
            const m = document.getElementById('messages');
            m.insertAdjacentHTML('beforeend', html);
            m.scrollTop = m.scrollHeight;
        }

        function react(id, emoji) {
            db.ref(`chats/${room}/${id}/reactions/${user}`).set(emoji);
            closeAll();
        }

        function showMenu(x, y, id, msgUser, content) {
            closeAll();
            const menu = document.getElementById('context-menu');
            menu.style.display = 'block';
            menu.style.left = x + 'px';
            menu.style.top = (y - 50) + 'px';

            document.getElementById('reply-action').onclick = () => {
                replyData = {u: msgUser, c: content};
                document.getElementById('reply-bar').style.display = 'flex';
                document.getElementById('reply-info').innerText = `Պատասխան ${msgUser}-ին`;
                closeAll();
                document.getElementById('msgInp').focus();
            };

            const delBtn = document.getElementById('delete-action');
            if(msgUser === user) {
                delBtn.style.display = 'block';
                delBtn.onclick = () => { if(confirm("Ջնջե՞լ")) db.ref(`chats/${room}/${id}`).remove(); closeAll(); };
            } else { delBtn.style.display = 'none'; }
        }

        function startPress(e, id, u, c) {
            const touch = e.touches[0];
            const row = document.querySelector(`[data-id="${id}"]`);
            pressTimer = setTimeout(() => {
                row.querySelector('.reaction-box').style.display = 'flex';
                showMenu(touch.pageX, touch.pageY, id, u, c);
            }, 600);
        }
        function endPress() { clearTimeout(pressTimer); }
        function closeAll() {
            document.querySelectorAll('.reaction-box').forEach(b => b.style.display = 'none');
            document.getElementById('context-menu').style.display = 'none';
        }

        window.onclick = (e) => { if(!e.target.closest('.bubble')) closeAll(); };
        document.getElementById('msgInp').oninput = () => {
            db.ref('typing/'+room).set({u:user, s:true});
            clearTimeout(tOut);
            tOut = setTimeout(() => db.ref('typing/'+room).set({s:false}), 2000);
        };
        document.getElementById('msgInp').onkeypress = (e) => { if(e.key === 'Enter') send(); };
    </script>
</body>
</html>
