<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Մասնավոր Չատ</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --primary-color: #0084ff;
            --bg-color: #f0f2f5;
            --my-msg-bg: #0084ff;
            --other-msg-bg: #ffffff;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: -apple-system, sans-serif;
            background-color: var(--bg-color);
            overflow: hidden;
        }

        /* Մուտքի էկրան */
        #login-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; padding: 20px; box-sizing: border-box;
        }

        .login-card {
            background: white; padding: 30px; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center;
        }

        input[type="text"] {
            width: 100%; padding: 12px; margin: 10px 0;
            border: 1px solid #ddd; border-radius: 25px; outline: none; box-sizing: border-box;
        }

        .btn-main {
            width: 100%; background: var(--primary-color); color: white;
            border: none; padding: 12px; border-radius: 25px; cursor: pointer; font-weight: bold;
        }

        /* Չատի էկրան */
        #chat-screen { display: none; flex-direction: column; height: 100vh; }

        header {
            background: white; padding: 15px; text-align: center;
            font-weight: bold; border-bottom: 1px solid #ddd; font-size: 18px; color: #333;
        }

        #messages {
            flex: 1; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column; gap: 12px;
        }

        /* Նամակների ոճը */
        .msg-row { display: flex; align-items: flex-end; gap: 10px; }
        .my-msg { flex-direction: row-reverse; }

        .avatar {
            width: 38px; height: 38px; border-radius: 50%;
            background: #ccc; flex-shrink: 0; border: 1px solid #ddd; object-fit: cover;
        }

        .bubble {
            padding: 10px 14px; border-radius: 18px; font-size: 15px;
            line-height: 1.4; max-width: 75%; position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .my-msg .bubble {
            background: var(--my-msg-bg); color: white;
            border-bottom-right-radius: 4px;
        }

        .other-msg .bubble {
            background: var(--other-msg-bg); color: #333;
            border-bottom-left-radius: 4px;
        }

        .user-name { font-size: 11px; opacity: 0.7; margin-bottom: 4px; display: block; }

        .chat-img {
            max-width: 100%; border-radius: 10px; margin-top: 5px;
            display: block; cursor: pointer;
        }

        /* Ներքևի դաշտը */
        .input-bar {
            background: white; padding: 10px; display: flex; align-items: center;
            gap: 10px; border-top: 1px solid #ddd; padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }

        #msgInput {
            flex: 1; border: none; background: #f0f2f5; padding: 12px 18px;
            border-radius: 25px; outline: none; font-size: 16px;
        }

        .icon-btn { cursor: pointer; font-size: 22px; color: var(--primary-color); }

        #send-btn {
            background: var(--primary-color); color: white; width: 42px; height: 42px;
            border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 18px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2 style="margin-top:0">Մուտք</h2>
            <input type="text" id="nameInput" placeholder="Գրիր անունդ...">
            <button class="btn-main" onclick="enterChat()">Սկսել</button>
        </div>
    </div>

    <div id="chat-screen">
        <header>Մասնավոր Չատ</header>
        <div id="messages"></div>
        
        <div class="input-bar">
            <label class="icon-btn">
                📷 <input type="file" id="imgInput" hidden accept="image/*" onchange="sendImage(this)">
            </label>
            <input type="text" id="msgInput" placeholder="Նամակ..." onkeypress="if(event.key==='Enter') sendText()">
            <button id="send-btn" onclick="sendText()">➤</button>
        </div>
    </div>

    <script>
        // Քո Firebase տվյալները
        const firebaseConfig = {
            apiKey: "AIzaSyBYHiH5sa7PLLqeHeHGB-p1hWU5TcY82Dw",
            authDomain: "mychat-160ff.firebaseapp.com",
            databaseURL: "https://mychat-160ff-default-rtdb.firebaseio.com",
            projectId: "mychat-160ff",
            storageBucket: "mychat-160ff.firebasestorage.app",
            messagingSenderId: "574166080101",
            appId: "1:574166080101:web:504c6f77687cd01fb7048c",
            measurementId: "G-GNFKZJ8G9S"
        };

        // Firebase-ի միացում
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const roomID = "secure_private_room_2026"; // Սա ձեր ընդհանուր սենյակն է
        let user = "";

        function enterChat() {
            const input = document.getElementById('nameInput');
            user = input.value.trim();
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                initChat();
            }
        }

        function sendText() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text) return;
            
            db.ref('chats/' + roomID).push({
                user: user,
                type: 'text',
                content: text,
                timestamp: Date.now(),
                avatar: `https://ui-avatars.com/api/?name=${user}&background=random`
            });
            input.value = "";
        }

        function sendImage(input) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                db.ref('chats/' + roomID).push({
                    user: user,
                    type: 'image',
                    content: e.target.result,
                    timestamp: Date.now(),
                    avatar: `https://ui-avatars.com/api/?name=${user}&background=random`
                });
            };
            reader.readAsDataURL(file);
        }

        function initChat() {
            const msgBox = document.getElementById('messages');
            
            // Լսել նոր նամակները
            db.ref('chats/' + roomID).on('child_added', (snap) => {
                const data = snap.val();
                const isMe = data.user === user;
                
                const messageElement = document.createElement('div');
                messageElement.className = `msg-row ${isMe ? 'my-msg' : 'other-msg'}`;
                
                const contentHTML = data.type === 'text' 
                    ? `<div>${data.content}</div>` 
                    : `<img src="${data.content}" class="chat-img" onclick="window.open(this.src)">`;

                messageElement.innerHTML = `
                    <img class="avatar" src="${data.avatar}">
                    <div class="bubble">
                        <span class="user-name">${data.user}</span>
                        ${contentHTML}
                    </div>
                `;
                
                msgBox.appendChild(messageElement);
                msgBox.scrollTop = msgBox.scrollHeight;
            });
        }
    </script>
</body>
  </html>
